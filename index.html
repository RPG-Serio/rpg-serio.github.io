<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RPG Master Hub</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main" id="main">
      <header class="topbar">
        <h1 id="page-title">Sessions</h1>
        <nav class="topnav" id="topnav"></nav>
        <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <nav class="mobile-nav" id="mobile-nav">
    <button class="close-btn" id="mobile-nav-close" aria-label="Close menu">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </nav>

  <script src="assets/js/app.js"></script>
</body>
</html>
